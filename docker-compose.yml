services:
  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.54"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web

  work-db:
    build:
      context: .
      dockerfile: apps/work-db/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.work-db.rule=Host(`${DOMAIN}`) && PathPrefix(`/db`)
      - traefik.http.routers.work-db.entrypoints=web
      - traefik.http.routers.work-db.middlewares=work-db-stripprefix
      - traefik.http.middlewares.work-db-stripprefix.stripprefix.prefixes=/db
      - traefik.http.services.work-db.loadbalancer.server.port=3000

  work-db-mcp:
    build:
      context: .
      dockerfile: mcp-servers/work-db-mcp-server/Dockerfile
    restart: unless-stopped
    environment:
      TRANSPORT: http
      PORT: "3000"
      WORK_DB_API_URL: http://work-db:3000
    expose:
      - "3000"
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.work-db-mcp.rule=Host(`${DOMAIN}`) && PathPrefix(`/mcp/db`)
      - traefik.http.routers.work-db-mcp.entrypoints=web
      - traefik.http.routers.work-db-mcp.middlewares=work-db-mcp-stripprefix
      - traefik.http.middlewares.work-db-mcp-stripprefix.stripprefix.prefixes=/mcp/db
      - traefik.http.services.work-db-mcp.loadbalancer.server.port=3000

networks:
  web:
    driver: bridge
